# Render Blueprint — mezzeMarin CRM (Docker)
# Yeni ücretsiz Postgres OLUŞTURMAZ (hesapta 1 ücretsiz DB sınırı var).
# Mevcut ücretsiz Postgres'i yeniden kullanır: DATABASE_URL'i elle gir.
# Uygulama tabloları "mezzemarin" şemasına yazar → başka projeyle çakışmaz.
#
# render.com → New → Blueprint → repo → Apply
services:
  - type: web
    name: mezzemarin-crm
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Mevcut Postgres'in "Internal Database URL" değerini Render panelinden gir
      - key: DATABASE_URL
        sync: false
      # Basic Auth — panelin herkese açık olmaması için ZORUNLU (elle gir)
      - key: APP_USERNAME
        value: admin
      - key: APP_PASSWORD
        sync: false
